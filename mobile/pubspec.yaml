name: safar
description: Android-first journey journal with Supabase Auth and FastAPI backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.1.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  supabase_flutter: ^2.5.6
  table_calendar: ^3.1.2
  record: ^7.1.0
  path_provider: ^2.1.6
  video_player: ^2.11.1
  just_audio: ^0.9.46
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/safar_background.png
    - assets/images/safar_logo.png
    - assets/images/daily_diary_flows.png
